name: CI Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install GCC
        run: sudo apt-get install -y gcc make
        
      - name: Compile
        run: |
          gcc -Wall -Wextra -o pokemon main.c
          echo "编译成功"
          
      - name: Run Unit Tests
        run: |
          if [ -f tests/test_runner ]; then
            ./tests/test_runner
          else
            echo "暂无测试文件"
          fi
